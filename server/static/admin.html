<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel administratora - Transport Chatbot</title>
    <link rel="stylesheet" href="styles.css?v=20260227" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <img src="dclog-logo.png" alt="DCLOG logo" />
          <div>
            <h1>Panel administratora</h1>
            <p>Lista wszystkich utworzonych zleceń</p>
          </div>
        </div>
        <div class="header-actions">
          <a class="button secondary" href="/">Wróć do czatu</a>
          <button id="refresh-btn" type="button">Odśwież</button>
        </div>
      </header>
      <div id="admin-guard" class="modal hidden">
        <div class="modal-content">
          <h3>Panel administratora</h3>
          <p>Podaj hasło, aby kontynuować.</p>
          <form id="admin-guard-form">
            <input type="password" id="admin-guard-input" placeholder="Hasło" autocomplete="off" required />
            <div class="modal-actions">
              <button type="button" id="admin-guard-cancel" class="button secondary">Anuluj</button>
              <button type="submit">Wejdź</button>
            </div>
            <div id="admin-guard-error" class="modal-error"></div>
          </form>
        </div>
      </div>

      <main>
        <div class="panel">
          <div class="order-header">
            <h2>Wszystkie zlecenia</h2>
            <div class="order-meta">
              <span class="badge" id="orders-count">0</span>
              <span class="muted" id="status-text"></span>
            </div>
          </div>
          <div id="orders-list" class="orders-list"></div>
        </div>
      </main>
      <div class="footer">Product preview, Designed by dclog.pl</div>
    </div>

    <script src="admin.js?v=20260227b"></script>
  </body>
</html>
